services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: field_realm
      MYSQL_USER: fieldrealm
      MYSQL_PASSWORD: fieldrealm_dev
      MYSQL_ROOT_PASSWORD: root_dev_only
    volumes:
      - field_realm_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev_only"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/field_realm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_USERNAME: fieldrealm
      DB_PASSWORD: fieldrealm_dev
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_SSL: ${MAIL_SSL:-true}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Field Realm}
    volumes:
      - ./backend/data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  field_realm_mysql:
