spring:
  application:
    name: field-realm-server
  datasource:
    url: ${DB_URL:jdbc:h2:mem:fieldrealm;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jackson:
    default-property-inclusion: non_null
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
management:
  endpoints:
    web:
      exposure:
        include: health,info

fieldrealm:
  mail:
    enabled: ${MAIL_ENABLED:false}
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    ssl: ${MAIL_SSL:true}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from-name: ${MAIL_FROM_NAME:场地弈境}
